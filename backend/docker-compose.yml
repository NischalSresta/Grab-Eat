services:
  postgres:
    image: postgres:15
    container_name: grabeat-postgres
    environment:
      POSTGRES_DB: grab-eats
      POSTGRES_USER: grab-eat
      POSTGRES_PASSWORD: 12345
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - grabeat-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  grabeat-network:
    driver: bridge
